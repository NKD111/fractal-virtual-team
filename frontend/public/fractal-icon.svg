<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1530"/>
      <stop offset="100%" style="stop-color:#2a1f3d"/>
    </linearGradient>
    <linearGradient id="frac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="50%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#FF6B9D" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background con corners redondeados -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Glow sutil de fondo -->
  <circle cx="256" cy="240" r="180" fill="url(#glow)"/>

  <!-- Triángulo fractal central -->
  <g transform="translate(256, 252)" filter="url(#shadow)">
    <!-- Triángulo grande externo -->
    <polygon points="0,-148 -128,76 128,76" fill="url(#frac)" opacity="0.92"/>

    <!-- Triángulo invertido central (espacio negativo — el "agujero" fractal) -->
    <polygon points="0,76 -64,-14 64,-14" fill="#1a1530"/>

    <!-- Triángulos de segundo nivel -->
    <polygon points="0,-108 -42,-14 42,-14" fill="url(#frac)" opacity="0.8"/>
    <polygon points="-84,36 -128,76 -42,76" fill="url(#frac)" opacity="0.8"/>
    <polygon points="84,36 42,76 128,76" fill="url(#frac)" opacity="0.8"/>

    <!-- Triángulos tercer nivel (más pequeños) -->
    <polygon points="0,-86 -20,-50 20,-50" fill="#FF6B9D" opacity="0.7"/>
    <polygon points="-105,55 -126,76 -84,76" fill="#9B59B6" opacity="0.7"/>
    <polygon points="105,55 84,76 126,76" fill="#FF6B35" opacity="0.7"/>

    <!-- Hub central — Mariana -->
    <circle cx="0" cy="20" r="18" fill="#FF6B9D" opacity="0.95"/>
    <circle cx="0" cy="20" r="10" fill="#ffffff" opacity="0.95"/>
    <circle cx="0" cy="20" r="4" fill="#FF6B9D"/>
  </g>

  <!-- Conexiones — los 11 agentes como nodos -->
  <!-- Agentes en esquinas -->
  <circle cx="72" cy="72" r="7" fill="#FF6B9D" opacity="0.8"/>
  <circle cx="440" cy="72" r="7" fill="#9B59B6" opacity="0.8"/>
  <circle cx="72" cy="440" r="7" fill="#FF6B35" opacity="0.8"/>
  <circle cx="440" cy="440" r="7" fill="#16A085" opacity="0.8"/>

  <!-- Agentes en bordes medios -->
  <circle cx="256" cy="56" r="5" fill="#E74C3C" opacity="0.7"/>
  <circle cx="456" cy="256" r="5" fill="#3498DB" opacity="0.7"/>
  <circle cx="256" cy="456" r="5" fill="#F39C12" opacity="0.7"/>
  <circle cx="56" cy="256" r="5" fill="#2ECC71" opacity="0.7"/>

  <!-- 3 agentes adicionales -->
  <circle cx="152" cy="80" r="4" fill="#FF6B9D" opacity="0.5"/>
  <circle cx="360" cy="80" r="4" fill="#9B59B6" opacity="0.5"/>
  <circle cx="256" cy="380" r="4" fill="#FF6B35" opacity="0.5"/>

  <!-- Líneas de conexión sutiles -->
  <line x1="72" y1="72" x2="256" y2="252" stroke="#FF6B9D" stroke-width="1" opacity="0.15"/>
  <line x1="440" y1="72" x2="256" y2="252" stroke="#9B59B6" stroke-width="1" opacity="0.15"/>
  <line x1="72" y1="440" x2="256" y2="252" stroke="#FF6B35" stroke-width="1" opacity="0.15"/>
  <line x1="440" y1="440" x2="256" y2="252" stroke="#16A085" stroke-width="1" opacity="0.15"/>
</svg>
